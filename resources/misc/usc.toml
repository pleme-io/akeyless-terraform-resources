[resource]
name = "akeyless_usc"
description = "Manages a universal secrets connector (USC) in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/usc-create"
create_schema = "uscCreate"
update_endpoint = "/usc-update"
update_schema = "uscUpdate"
read_endpoint = "/usc-get"
read_schema = "uscGet"
read_response_schema = "UscGetSecretOutput"
delete_endpoint = "/usc-delete"
delete_schema = "uscDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

