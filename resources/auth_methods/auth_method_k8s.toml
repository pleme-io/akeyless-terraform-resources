[resource]
name = "akeyless_auth_method_k8s"
description = "Manages a Kubernetes authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-k8s"
create_schema = "authMethodCreateK8s"
update_endpoint = "/auth-method-update-k8s"
update_schema = "authMethodUpdateK8s"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"bound-namespaces" = { description = "Kubernetes namespaces to restrict access" }
"bound-service-account-names" = { description = "Kubernetes service account names to restrict access" }
"bound-pod-names" = { description = "Kubernetes pod names to restrict access" }
"gen-key" = { description = "Automatically generate a key pair (true/false)" }
"public-key" = { description = "Public key PEM for token verification" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.k8s_access_rules.bound_namespaces" = "bound_namespaces"
"access_info.k8s_access_rules.bound_service_account_names" = "bound_service_account_names"
"access_info.k8s_access_rules.bound_pod_names" = "bound_pod_names"
