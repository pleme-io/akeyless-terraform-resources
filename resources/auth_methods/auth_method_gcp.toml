[resource]
name = "akeyless_auth_method_gcp"
description = "Manages a GCP authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-gcp"
create_schema = "authMethodCreateGcp"
update_endpoint = "/auth-method-update-gcp"
update_schema = "authMethodUpdateGcp"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"type" = { description = "GCP auth type: gce or iam" }
"audience" = { description = "GCP audience for IAM auth" }
"bound-projects" = { description = "GCP project IDs to restrict access" }
"bound-service-accounts" = { description = "GCP service account emails to restrict access" }
"bound-zones" = { description = "GCP zones to restrict access (GCE type)" }
"bound-regions" = { description = "GCP regions to restrict access (GCE type)" }
"bound-labels" = { description = "GCP labels to restrict access (GCE type)" }
"service-account-creds-data" = { sensitive = true, description = "GCP service account credentials JSON" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.gcp_access_rules.type" = "type"
"access_info.gcp_access_rules.audience" = "audience"
"access_info.gcp_access_rules.bound_projects" = "bound_projects"
"access_info.gcp_access_rules.bound_service_accounts" = "bound_service_accounts"
"access_info.gcp_access_rules.bound_zones" = "bound_zones"
"access_info.gcp_access_rules.bound_regions" = "bound_regions"
"access_info.gcp_access_rules.bound_labels" = "bound_labels"
