[resource]
name = "akeyless_target_openai"
description = "Manages an OpenAI target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-openai"
create_schema = "targetCreateOpenai"
update_endpoint = "/target-update-openai"
update_schema = "targetUpdateOpenai"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"openai-key" = { sensitive = true, description = "OpenAI API key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
