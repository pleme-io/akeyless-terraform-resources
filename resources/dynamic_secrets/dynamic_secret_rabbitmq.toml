[resource]
name = "akeyless_dynamic_secret_rabbitmq"
description = "Manages a RabbitMQ dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-rabbitmq"
create_schema = "dynamicSecretCreateRabbitMq"
update_endpoint = "/dynamic-secret-update-rabbitmq"
update_schema = "dynamicSecretUpdateRabbitMq"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"rabbitmq-server-uri" = { description = "RabbitMQ management API URI" }
"rabbitmq-server-user" = { description = "RabbitMQ admin username" }
"rabbitmq-server-password" = { sensitive = true, description = "RabbitMQ admin password" }
"rabbitmq-user-conf-permission" = { description = "RabbitMQ configure permission for dynamic users" }
"rabbitmq-user-read-permission" = { description = "RabbitMQ read permission for dynamic users" }
"rabbitmq-user-write-permission" = { description = "RabbitMQ write permission for dynamic users" }
"rabbitmq-user-vhost" = { description = "RabbitMQ vhost for dynamic users" }
"rabbitmq-user-tags" = { description = "RabbitMQ tags for dynamic users (comma-separated)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
