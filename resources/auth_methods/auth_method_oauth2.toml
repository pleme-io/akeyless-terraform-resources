[resource]
name = "akeyless_auth_method_oauth2"
description = "Manages an OAuth 2.0 authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-oauth2"
create_schema = "authMethodCreateOAuth2"
update_endpoint = "/auth-method-update-oauth2"
update_schema = "authMethodUpdateOAuth2"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"jwks-uri" = { description = "JWKS URI for token verification" }
"jwks-json-data" = { description = "JWKS JSON data for token verification" }
"unique-identifier" = { description = "Unique identifier claim name in the JWT token" }
"bound-client-ids" = { description = "OAuth2 client IDs to restrict access" }
"issuer" = { description = "OAuth2 issuer URL" }
"audience" = { description = "OAuth2 audience" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.oauth2_access_rules.jwks_uri" = "jwks_uri"
"access_info.oauth2_access_rules.unique_identifier" = "unique_identifier"
"access_info.oauth2_access_rules.bound_client_ids" = "bound_client_ids"
"access_info.oauth2_access_rules.issuer" = "issuer"
"access_info.oauth2_access_rules.audience" = "audience"
