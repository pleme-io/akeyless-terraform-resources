[resource]
name = "akeyless_dynamic_secret_venafi"
description = "Manages a Venafi dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-venafi"
create_schema = "dynamicSecretCreateVenafi"
update_endpoint = "/dynamic-secret-update-venafi"
update_schema = "dynamicSecretUpdateVenafi"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"venafi-api-key" = { sensitive = true, description = "Venafi API key" }
"venafi-baseurl" = { description = "Venafi base URL" }
"venafi-tpp-username" = { description = "Venafi TPP username" }
"venafi-tpp-password" = { sensitive = true, description = "Venafi TPP password" }
"venafi-tpp-access-token" = { sensitive = true, description = "Venafi TPP access token" }
"venafi-zone" = { description = "Venafi zone/policy folder" }
"venafi-use-tpp" = { type_override = "bool", description = "Use Venafi TPP (instead of Cloud)" }
"store-private-key" = { type_override = "bool", description = "Store private key in Akeyless" }
"key-type" = { description = "Certificate key type: RSA or ECDSA" }
"key-bit-size" = { description = "Key bit size (e.g., 2048, 4096)" }
"key-curve" = { description = "ECDSA key curve (P256, P384, P521)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
