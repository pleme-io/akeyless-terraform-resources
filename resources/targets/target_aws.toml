[resource]
name = "akeyless_target_aws"
description = "Manages an AWS target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-aws"
create_schema = "targetCreateAws"
update_endpoint = "/target-update-aws"
update_schema = "targetUpdateAws"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"access-key-id" = { sensitive = true, description = "AWS access key ID" }
"access-key" = { sensitive = true, description = "AWS secret access key" }
"region" = { description = "AWS region" }
"session-token" = { sensitive = true, description = "AWS session token (for temporary credentials)" }
"use-gw-cloud-identity" = { type_override = "bool", description = "Use gateway cloud identity for authentication" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
