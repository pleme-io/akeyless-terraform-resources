[resource]
name = "akeyless_target_gitlab"
description = "Manages a GitLab target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-gitlab"
create_schema = "targetCreateGitlab"
update_endpoint = "/target-update-gitlab"
update_schema = "targetUpdateGitlab"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"gitlab-access-token" = { sensitive = true, description = "GitLab personal access token" }
"gitlab-certificate" = { sensitive = true, description = "GitLab TLS certificate (PEM)" }
"gitlab-url" = { description = "GitLab URL (for self-hosted)" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
