[resource]
name = "akeyless_target_azure"
description = "Manages an Azure target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-azure"
create_schema = "targetCreateAzure"
update_endpoint = "/target-update-azure"
update_schema = "targetUpdateAzure"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"client-id" = { description = "Azure client/application ID" }
"client-secret" = { sensitive = true, description = "Azure client secret" }
"tenant-id" = { description = "Azure tenant ID" }
"subscription-id" = { description = "Azure subscription ID" }
"resource-group-name" = { description = "Azure resource group name" }
"resource-name" = { description = "Azure resource name" }
"use-gw-cloud-identity" = { type_override = "bool", description = "Use gateway cloud identity for authentication" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
