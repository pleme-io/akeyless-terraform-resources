[resource]
name = "akeyless_classic_key"
description = "Manages a classic cryptographic key"
category = "key"

[crud]
create_endpoint = "/create-classic-key"
create_schema = "CreateClassicKey"
update_endpoint = "/update-item"
update_schema = "updateItem"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name", "alg"]

[fields]
"alg" = { description = "Classic key algorithm: AES128GCM, AES256GCM, AES128SIV, AES256SIV, RSA1024, RSA2048, RSA3072, RSA4096, EC256, EC384" }
"cert-file-data" = { sensitive = true, description = "Certificate PEM data (for RSA keys)" }
"key-data" = { sensitive = true, description = "Key material (base64 encoded)" }
"protection-key-name" = { description = "Encryption key used to protect this key" }
"generate-self-signed-certificate" = { type_override = "bool", description = "Generate a self-signed certificate" }
"certificate-common-name" = { description = "Common name for generated certificate" }
"certificate-organization" = { description = "Organization for generated certificate" }
"certificate-ttl" = { description = "Certificate TTL in days" }
"certificate-country" = { description = "Country for generated certificate" }
"certificate-locality" = { description = "Locality for generated certificate" }
"certificate-province" = { description = "Province for generated certificate" }
"conf-file-data" = { skip = true }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "Key description" }
tags = { description = "Tags for the key" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_metadata" = "description"
"item_tags" = "tags"
"protection_key_name" = "protection_key_name"
"classic_key_details.algorithm" = "alg"
