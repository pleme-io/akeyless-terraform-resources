[resource]
name = "akeyless_auth_method_universal_identity"
description = "Manages a Universal Identity authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-universal-identity"
create_schema = "authMethodCreateUniversalIdentity"
update_endpoint = "/auth-method-update-universal-identity"
update_schema = "authMethodUpdateUniversalIdentity"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"deny-rotate" = { type_override = "bool", description = "Deny key rotation" }
"deny-inheritance" = { type_override = "bool", description = "Deny inheritance of child tokens" }
"ttl" = { description = "Token TTL in seconds" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.universal_identity_access_rules.deny_rotate" = "deny_rotate"
"access_info.universal_identity_access_rules.deny_inheritance" = "deny_inheritance"
"access_info.universal_identity_access_rules.ttl" = "ttl"
