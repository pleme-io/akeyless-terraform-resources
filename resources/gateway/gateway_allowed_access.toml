[resource]
name = "akeyless_gateway_allowed_access"
description = "Manages a gateway allowed access permission"
category = "gateway"

[crud]
create_endpoint = "/gateway-create-allowed-access"
create_schema = "gatewayCreateAllowedAccess"
update_endpoint = "/gateway-update-allowed-access"
update_schema = "gatewayUpdateAllowedAccess"
read_endpoint = "/gateway-get-allowed-access"
read_schema = "gatewayGetAllowedAccess"
delete_endpoint = "/gateway-delete-allowed-access"
delete_schema = "gatewayDeleteAllowedAccess"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { description = "Auth method access ID to allow" }
"sub-claims" = { description = "Sub-claims for the allowed access (key=value pairs)" }
"permissions" = { description = "Allowed permissions: admin, defaults, targets, classic_keys, automatic_migration, ldap_auth, dynamic_secret, k8s_auth" }
description = { description = "Allowed access description" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"name" = "name"
"access_id" = "access_id"
"permissions" = "permissions"
"sub_claims" = "sub_claims"
