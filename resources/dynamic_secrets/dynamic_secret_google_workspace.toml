[resource]
name = "akeyless_dynamic_secret_google_workspace"
description = "Manages a Google Workspace dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-google-workspace"
create_schema = "dynamicSecretCreateGoogleWorkspace"
update_endpoint = "/dynamic-secret-update-google-workspace"
update_schema = "dynamicSecretUpdateGoogleWorkspace"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"gw-sa-email" = { description = "Google Workspace service account email" }
"gw-key" = { sensitive = true, description = "Google Workspace service account key JSON (base64)" }
"gw-admin-email" = { description = "Google Workspace admin email (for domain-wide delegation)" }
"role-name" = { description = "Google Workspace admin role" }
"role-scope" = { description = "Google Workspace role scope (ORG_UNIT)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
