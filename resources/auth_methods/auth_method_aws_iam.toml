[resource]
name = "akeyless_auth_method_aws_iam"
description = "Manages an AWS IAM authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-aws-iam"
create_schema = "authMethodCreateAwsIam"
update_endpoint = "/auth-method-update-aws-iam"
update_schema = "authMethodUpdateAwsIam"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
token = { skip = true }
"uid-token" = { skip = true }
json = { skip = true }
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"bound-aws-account-id" = { description = "AWS account IDs to restrict access" }
"bound-arn" = { description = "Full ARNs to restrict access" }
"bound-role-name" = { description = "AWS role names to restrict access" }
"bound-role-id" = { description = "AWS role IDs to restrict access" }
"bound-resource-id" = { description = "AWS resource IDs to restrict access" }
"bound-user-name" = { description = "AWS user names to restrict access" }
"bound-user-id" = { description = "AWS user IDs to restrict access" }
"sts-url" = { description = "STS endpoint URL (default: https://sts.amazonaws.com)" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.aws_iam_access_rules.account_id" = "bound_aws_account_id"
"access_info.aws_iam_access_rules.arn" = "bound_arn"
"access_info.aws_iam_access_rules.role_name" = "bound_role_name"
"access_info.aws_iam_access_rules.role_id" = "bound_role_id"
"access_info.aws_iam_access_rules.resource_id" = "bound_resource_id"
"access_info.aws_iam_access_rules.user_name" = "bound_user_name"
"access_info.aws_iam_access_rules.user_id" = "bound_user_id"
"access_info.aws_iam_access_rules.sts_endpoint" = "sts_url"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
