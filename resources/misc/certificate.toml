[resource]
name = "akeyless_certificate"
description = "Manages a certificate in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/create-certificate"
create_schema = "createCertificate"
update_endpoint = "/update-certificate-value"
update_schema = "updateCertificateValue"
read_endpoint = "/get-certificate-value"
read_schema = "getCertificateValue"
read_response_schema = "GetCertificateValueOutput"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

