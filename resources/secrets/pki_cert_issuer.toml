[resource]
name = "akeyless_pki_cert_issuer"
description = "Manages a PKI certificate issuer"
category = "secret"

[crud]
create_endpoint = "/create-pki-cert-issuer"
create_schema = "CreatePKICertIssuer"
update_endpoint = "/update-pki-cert-issuer"
update_schema = "UpdatePKICertIssuer"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name", "signer-key-name"]

[fields]
"allow-any-name" = { type_override = "bool", description = "If set, clients can request certificates for any CN" }
"allow-copy-ext-from-csr" = { type_override = "bool", description = "Allow copying extra extensions from CSR" }
"allow-subdomains" = { type_override = "bool", description = "Allow certificates for subdomains of allowed domains" }
"allowed-domains" = { description = "Comma-delimited list of allowed domains" }
"allowed-extra-extensions" = { description = "JSON string of allowed extra extensions" }
"allowed-ip-sans" = { description = "Comma-delimited list of allowed CIDRs for IP SANs" }
"allowed-uri-sans" = { description = "Comma-delimited list of allowed URIs for URI SANs" }
"auto-renew" = { type_override = "bool", description = "Automatically renew certificates before expiration" }
"ca-target" = { description = "Name of existing CA target (required in Public CA mode)" }
"client-flag" = { type_override = "bool", description = "Flag certificates for client auth use" }
"code-signing-flag" = { type_override = "bool", description = "Flag certificates for code signing use" }
"country" = { description = "Comma-separated list of countries for issued certificate" }
"create-private-crl" = { type_override = "bool", description = "Expose CRL endpoint in Gateway" }
"create-public-crl" = { type_override = "bool", description = "Expose public CRL endpoint" }
"create-private-ocsp" = { type_override = "bool", description = "Expose private OCSP endpoint" }
"create-public-ocsp" = { type_override = "bool", description = "Expose public OCSP endpoint" }
"critical-key-usage" = { description = "Mark key usage as critical" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "Description of the object" }
"destination-path" = { description = "Destination path for generated certificates" }
"disable-wildcards" = { type_override = "bool", description = "Disable wildcard certificates" }
"enable-acme" = { type_override = "bool", description = "Enable ACME protocol" }
"gw-cluster-url" = { description = "Gateway cluster URL" }
"is-ca" = { type_override = "bool", description = "If set, the basic constraints is-ca flag is set" }
"item-custom-fields" = { skip = true }
"key-usage" = { description = "Key usage: DigitalSignature, KeyAgreement, KeyEncipherment" }
"locality" = { description = "Locality for issued certificate" }
"max-path-len" = { description = "Maximum path length for CA certificates" }
"not-enforce-hostnames" = { type_override = "bool", description = "Do not enforce hostnames" }
"not-require-cn" = { type_override = "bool", description = "Do not require common name" }
"ocsp-ttl" = { description = "OCSP response TTL" }
"organizations" = { description = "Organization for issued certificate" }
"organizational-units" = { description = "Organizational units for issued certificate" }
"postal-code" = { description = "Postal code for issued certificate" }
"protect-certificates" = { type_override = "bool", description = "Protect generated certificates" }
"province" = { description = "Province for issued certificate" }
"server-flag" = { type_override = "bool", description = "Flag certificates for server auth use" }
"signer-key-name" = { description = "Key to sign certificates with" }
"street-address" = { description = "Street address for issued certificate" }
tag = { description = "Tags for the PKI cert issuer" }
"ttl" = { description = "Certificate TTL" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_metadata" = "description"
"item_tags" = "tags"
"delete_protection" = "delete_protection"
