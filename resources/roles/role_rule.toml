[resource]
name = "akeyless_role_rule"
description = "Manages a role rule in Akeyless Vault"
category = "role"

[crud]
create_endpoint = "/set-role-rule"
create_schema = "setRoleRule"
# No update endpoint — delete and recreate
read_endpoint = "/get-role"
read_schema = "getRole"
read_response_schema = "Role"
delete_endpoint = "/delete-role-rule"
delete_schema = "deleteRoleRule"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name", "path", "capability"]

[fields]
"role-name" = { description = "Role name to attach the rule to" }
"path" = { description = "Item path the rule applies to" }
"capability" = { description = "Permission capability: read, create, update, delete, list, deny" }
"rule-type" = { description = "Rule type: item-rule or auth-method-rule or role-rule" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"role_name" = "role_name"
