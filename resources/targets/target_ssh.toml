[resource]
name = "akeyless_target_ssh"
description = "Manages an SSH target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-ssh"
create_schema = "targetCreateSSH"
update_endpoint = "/target-update-ssh"
update_schema = "targetUpdateSSH"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"host" = { description = "SSH host address" }
"port" = { description = "SSH port (default: 22)" }
"ssh-username" = { description = "SSH username" }
"ssh-password" = { sensitive = true, description = "SSH password" }
"private-key" = { sensitive = true, description = "SSH private key (PEM)" }
"private-key-password" = { sensitive = true, description = "SSH private key passphrase" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
