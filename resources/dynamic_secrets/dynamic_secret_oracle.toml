[resource]
name = "akeyless_dynamic_secret_oracle"
description = "Manages an Oracle dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-oracle"
create_schema = "dynamicSecretCreateOracleDb"
update_endpoint = "/dynamic-secret-update-oracle"
update_schema = "dynamicSecretUpdateOracleDb"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"oracle-host" = { description = "Oracle host" }
"oracle-port" = { description = "Oracle port (default: 1521)" }
"oracle-service-name" = { description = "Oracle service name" }
"oracle-username" = { description = "Oracle admin username" }
"oracle-password" = { sensitive = true, description = "Oracle admin password" }
"oracle-creation-statements" = { description = "Oracle creation statements" }
"oracle-revocation-statements" = { description = "Oracle revocation statements" }
"db-server-certificates" = { sensitive = true, description = "Database server certificates (PEM)" }
"db-server-name" = { description = "Database server name for TLS verification" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
