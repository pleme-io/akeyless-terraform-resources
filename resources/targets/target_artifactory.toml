[resource]
name = "akeyless_target_artifactory"
description = "Manages an Artifactory target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-artifactory"
create_schema = "targetCreateArtifactory"
update_endpoint = "/target-update-artifactory"
update_schema = "targetUpdateArtifactory"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"artifactory-admin-name" = { description = "Artifactory admin username" }
"artifactory-admin-pwd" = { sensitive = true, description = "Artifactory admin password" }
"base-url" = { description = "Artifactory base URL" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
