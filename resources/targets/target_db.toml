[resource]
name = "akeyless_target_db"
description = "Manages a database target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-db"
create_schema = "targetCreateDb"
update_endpoint = "/target-update-db"
update_schema = "targetUpdateDb"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"db-type" = { description = "Database type: mysql, mssql, postgresql, mongodb, snowflake, oracle, cassandra, redshift, hanadb" }
"host" = { description = "Database hostname" }
"port" = { description = "Database port" }
"db-name" = { description = "Database name" }
"user-name" = { description = "Database username" }
"pwd" = { sensitive = true, description = "Database password" }
"db-server-certificates" = { sensitive = true, description = "Database server TLS certificates (PEM)" }
"db-server-name" = { description = "Database server name for TLS verification" }
"ssl" = { type_override = "bool", description = "Enable SSL connection" }
"ssl-certificate" = { sensitive = true, description = "Client SSL certificate (PEM)" }
"mongodb-atlas" = { type_override = "bool", description = "Use MongoDB Atlas connection" }
"mongodb-atlas-project-id" = { description = "MongoDB Atlas project ID" }
"mongodb-atlas-api-public-key" = { description = "MongoDB Atlas API public key" }
"mongodb-atlas-api-private-key" = { sensitive = true, description = "MongoDB Atlas API private key" }
"mongodb-default-auth-db" = { description = "MongoDB default authentication database" }
"mongodb-uri-options" = { description = "MongoDB additional URI options" }
"snowflake-account" = { description = "Snowflake account identifier" }
"oracle-service-name" = { description = "Oracle service name" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
