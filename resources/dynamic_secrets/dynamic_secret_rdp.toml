[resource]
name = "akeyless_dynamic_secret_rdp"
description = "Manages an RDP dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-rdp"
create_schema = "dynamicSecretCreateRdp"
update_endpoint = "/dynamic-secret-update-rdp"
update_schema = "dynamicSecretUpdateRdp"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"rdp-admin-name" = { description = "RDP admin username" }
"rdp-admin-pwd" = { sensitive = true, description = "RDP admin password" }
"rdp-host-name" = { description = "RDP host address" }
"rdp-host-port" = { description = "RDP port (default: 3389)" }
"rdp-user-groups" = { description = "RDP user groups for dynamic users" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
