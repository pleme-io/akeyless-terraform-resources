[resource]
name = "akeyless_dynamic_secret_redshift"
description = "Manages a Redshift dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-redshift"
create_schema = "dynamicSecretCreateRedshift"
update_endpoint = "/dynamic-secret-update-redshift"
update_schema = "dynamicSecretUpdateRedshift"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"redshift-dbname" = { description = "Redshift database name" }
"redshift-username" = { description = "Redshift admin username" }
"redshift-password" = { sensitive = true, description = "Redshift admin password" }
"redshift-host" = { description = "Redshift host" }
"redshift-port" = { description = "Redshift port (default: 5439)" }
"creation-statements" = { description = "Redshift creation statements" }
"ssl" = { type_override = "bool", description = "Enable SSL connection" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
