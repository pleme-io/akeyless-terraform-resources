[resource]
name = "akeyless_target_linked"
description = "Manages a linked target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-linked"
create_schema = "targetCreateLinked"
update_endpoint = "/target-update-linked"
update_schema = "targetUpdateLinked"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"parent-target-name" = { description = "Parent target name to link to" }
"hosts" = { description = "Hosts for the linked target" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
