[resource]
name = "akeyless_rotated_secret_redshift"
description = "Manages a Redshift rotated secret"
category = "rotated_secret"

[crud]
create_endpoint = "/rotated-secret-create-redshift"
create_schema = "rotatedSecretCreateRedshift"
update_endpoint = "/rotated-secret-update-redshift"
update_schema = "rotatedSecretUpdateRedshift"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this rotated secret" }
"rotation-interval" = { description = "Rotation interval (e.g., 30d, 720h)" }
"rotation-hour" = { description = "Hour of day to rotate (0-23)" }
"rotator-type" = { description = "Rotator type: target or password" }
"auto-rotate" = { type_override = "bool", description = "Enable automatic rotation" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the rotated secret" }
"rotated-username" = { description = "Database username to rotate password for" }
"rotated-password" = { sensitive = true, description = "Initial database password" }
description = { description = "Rotated secret description" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_tags" = "tags"
"item_metadata" = "description"
"item_targets_assoc.0.target_name" = "target_name"
"rotation_interval" = "rotation_interval"
"auto_rotate" = "auto_rotate"
