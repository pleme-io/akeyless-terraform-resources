[resource]
name = "akeyless_dynamic_secret_snowflake"
description = "Manages a Snowflake dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-snowflake"
create_schema = "dynamicSecretCreateSnowflake"
update_endpoint = "/dynamic-secret-update-snowflake"
update_schema = "dynamicSecretUpdateSnowflake"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"sf-account" = { description = "Snowflake account identifier" }
"sf-username" = { description = "Snowflake admin username" }
"sf-password" = { sensitive = true, description = "Snowflake admin password" }
"sf-warehouse-name" = { description = "Snowflake warehouse name" }
"sf-dbname" = { description = "Snowflake database name" }
"sf-schema" = { description = "Snowflake schema name" }
"sf-role" = { description = "Snowflake role for dynamic users" }
"sf-user-role" = { description = "Snowflake role to grant to dynamic users" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
