[resource]
name = "akeyless_static_secret"
description = "Manages a static secret in Akeyless Vault"
category = "secret"

[crud]
create_endpoint = "/create-secret"
create_schema = "createSecret"
update_endpoint = "/update-secret-val"
update_schema = "updateSecretVal"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
accessibility = { description = "Secret accessibility: regular or personal" }
"change-event" = { skip = true }
"custom-field" = { skip = true }
"item-custom-fields" = { skip = true }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"protection_key" = { description = "Encryption key name for the secret" }
value = { sensitive = true, description = "The secret value" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_tags" = "tags"
"item_metadata" = "description"
"delete_protection" = "delete_protection"
"protection_key_name" = "protection_key"
