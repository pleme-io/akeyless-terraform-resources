[resource]
name = "akeyless_gateway_migration"
description = "Manages a gateway migration in Akeyless"
category = "gateway"

[crud]
create_endpoint = "/gateway-create-migration"
create_schema = "gatewayCreateMigration"
update_endpoint = "/gateway-update-migration"
update_schema = "gatewayUpdateMigration"
read_endpoint = "/gateway-get-migration"
read_schema = "gatewayGetMigration"
read_response_schema = "gatewayMigrationGetOutput"
delete_endpoint = "/gateway-delete-migration"
delete_schema = "gatewayDeleteMigration"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

