[resource]
name = "akeyless_auth_method_cert"
description = "Manages a certificate authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-cert"
create_schema = "authMethodCreateCert"
update_endpoint = "/auth-method-update-cert"
update_schema = "authMethodUpdateCert"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"certificate-data" = { sensitive = true, description = "PEM certificate data for validation" }
"bound-common-names" = { description = "Bound common names for certificate matching" }
"bound-dns-sans" = { description = "Bound DNS SANs for certificate matching" }
"bound-email-sans" = { description = "Bound email SANs for certificate matching" }
"bound-uri-sans" = { description = "Bound URI SANs for certificate matching" }
"bound-organizational-units" = { description = "Bound organizational units for certificate matching" }
"bound-extensions" = { description = "Bound extensions (OID:value pairs)" }
"revoked-cert-ids" = { description = "Revoked certificate serial numbers" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.cert_access_rules.bound_common_names" = "bound_common_names"
"access_info.cert_access_rules.bound_dns_sans" = "bound_dns_sans"
"access_info.cert_access_rules.bound_email_sans" = "bound_email_sans"
"access_info.cert_access_rules.bound_uri_sans" = "bound_uri_sans"
"access_info.cert_access_rules.bound_organizational_units" = "bound_organizational_units"
"access_info.cert_access_rules.bound_extensions" = "bound_extensions"
"access_info.cert_access_rules.certificate_data" = "certificate_data"
