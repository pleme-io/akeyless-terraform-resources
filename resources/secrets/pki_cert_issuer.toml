[resource]
name = "akeyless_pki_cert_issuer"
description = "Manages a PKI certificate issuer"
category = "secret"

[crud]
create_endpoint = "/create-pki-cert-issuer"
create_schema = "createPKICertIssuer"
update_endpoint = "/update-pki-cert-issuer"
update_schema = "updatePKICertIssuer"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"signer-key-name" = { description = "Signing key name for the PKI issuer" }
"ttl" = { description = "Certificate TTL (e.g., 8760h)" }
"allowed-domains" = { description = "Allowed domains for issued certificates (comma-separated)" }
"allowed-uri-sans" = { description = "Allowed URI SANs (comma-separated)" }
"allow-subdomains" = { type_override = "bool", description = "Allow subdomain certificates" }
"allow-any-name" = { type_override = "bool", description = "Allow any common name" }
"not-enforce-hostnames" = { type_override = "bool", description = "Do not enforce hostnames" }
"not-require-cn" = { type_override = "bool", description = "Do not require common name" }
"server-flag" = { type_override = "bool", description = "Set server auth extended key usage" }
"client-flag" = { type_override = "bool", description = "Set client auth extended key usage" }
"code-signing-flag" = { type_override = "bool", description = "Set code signing extended key usage" }
"key-usage" = { description = "Key usage flags (comma-separated)" }
"organizational-units" = { description = "Organizational units for issued certificates" }
"organizations" = { description = "Organizations for issued certificates" }
"country" = { description = "Country for issued certificates" }
"locality" = { description = "Locality for issued certificates" }
"province" = { description = "Province for issued certificates" }
"street-address" = { description = "Street address for issued certificates" }
"postal-code" = { description = "Postal code for issued certificates" }
"ca-target" = { description = "CA target name" }
"gw-cluster-url" = { description = "Gateway cluster URL for PKI operations" }
"destination-path" = { description = "Destination path for issued certificates" }
"protection-key-name" = { description = "Protection key name for the issuer" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "PKI issuer description" }
tags = { description = "Tags for the PKI issuer" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_metadata" = "description"
"item_tags" = "tags"
"certificate_issue_details.signer_key_name" = "signer_key_name"
"certificate_issue_details.ttl" = "ttl"
"certificate_issue_details.allowed_domains" = "allowed_domains"
