[resource]
name = "akeyless_folder"
description = "Manages a folder in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/folder-create"
create_schema = "folderCreate"
update_endpoint = "/folder-update"
update_schema = "folderUpdate"
read_endpoint = "/folder-get"
read_schema = "folderGet"
read_response_schema = "folderGetOutput"
delete_endpoint = "/folder-delete"
delete_schema = "folderDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
accessibility = { description = "Folder accessibility: regular or personal" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "Description of the folder" }
tags = { description = "Tags for the folder" }

[read_mapping]
"folder_name" = "name"
