[resource]
name = "akeyless_dynamic_secret_ping"
description = "Manages a Ping Identity dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-ping"
create_schema = "dynamicSecretCreatePing"
update_endpoint = "/dynamic-secret-update-ping"
update_schema = "dynamicSecretUpdatePing"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"ping-url" = { description = "Ping Identity server URL" }
"ping-privileged-user" = { description = "Ping Identity privileged username" }
"ping-password" = { sensitive = true, description = "Ping Identity password" }
"ping-administrative-port" = { description = "Ping Identity administrative port" }
"ping-signing-dn" = { description = "Ping Identity signing DN" }
"ping-issuer-dn" = { description = "Ping Identity issuer DN" }
"ping-grant-types" = { description = "Ping Identity grant types" }
"ping-redirect-uris" = { description = "Ping Identity redirect URIs" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
