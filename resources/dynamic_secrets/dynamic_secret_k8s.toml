[resource]
name = "akeyless_dynamic_secret_k8s"
description = "Manages a Kubernetes dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-k8s"
create_schema = "dynamicSecretCreateK8s"
update_endpoint = "/dynamic-secret-update-k8s"
update_schema = "dynamicSecretUpdateK8s"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"k8s-cluster-endpoint" = { description = "Kubernetes API server URL" }
"k8s-cluster-ca-cert" = { sensitive = true, description = "Kubernetes cluster CA certificate (PEM)" }
"k8s-cluster-token" = { sensitive = true, description = "Kubernetes bearer token" }
"k8s-service-account" = { description = "Kubernetes service account name" }
"k8s-namespace" = { description = "Kubernetes namespace" }
"k8s-allowed-namespaces" = { description = "Allowed Kubernetes namespaces (comma-separated)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
