[resource]
name = "akeyless_target_eks"
description = "Manages an Amazon EKS target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-eks"
create_schema = "targetCreateEks"
update_endpoint = "/target-update-eks"
update_schema = "targetUpdateEks"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"eks-cluster-name" = { description = "EKS cluster name" }
"eks-cluster-endpoint" = { description = "EKS cluster API server URL" }
"eks-cluster-ca-cert" = { sensitive = true, description = "EKS cluster CA certificate (PEM)" }
"eks-access-key-id" = { sensitive = true, description = "AWS access key ID for EKS" }
"eks-secret-access-key" = { sensitive = true, description = "AWS secret access key for EKS" }
"eks-region" = { description = "AWS region for EKS cluster" }
"use-gw-cloud-identity" = { type_override = "bool", description = "Use gateway cloud identity for authentication" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
