[resource]
name = "akeyless_dynamic_secret_github"
description = "Manages a GitHub dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-github"
create_schema = "dynamicSecretCreateGithub"
update_endpoint = "/dynamic-secret-update-github"
update_schema = "dynamicSecretUpdateGithub"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"github-app-id" = { description = "GitHub App ID" }
"github-app-private-key" = { sensitive = true, description = "GitHub App private key (PEM)" }
"github-base-url" = { description = "GitHub base URL (for GitHub Enterprise)" }
"installation-id" = { description = "GitHub App installation ID" }
"installation-organization" = { description = "GitHub organization for installation" }
"installation-repository" = { description = "GitHub repository for installation" }
"token-permissions" = { description = "GitHub token permissions (JSON)" }
"token-repositories" = { description = "GitHub repositories for token scope (comma-separated)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
