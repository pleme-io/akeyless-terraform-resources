[resource]
name = "akeyless_rotated_secret_redshift"
description = "Manages a Redshift rotated secret"
category = "rotated_secret"

[crud]
create_endpoint = "/rotated-secret-create-redshift"
create_schema = "rotatedSecretCreateRedshift"
update_endpoint = "/rotated-secret-update-redshift"
update_schema = "rotatedSecretUpdateRedshift"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"authentication-credentials" = { description = "Credentials to connect with: use-user-creds or use-target-creds" }
"auto-rotate" = { description = "Whether to automatically rotate every rotation-interval days [true/false]" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "Description of the object" }
"item-custom-fields" = { skip = true }
"key" = { description = "Encryption key name for the secret value" }
"max-versions" = { description = "Maximum number of versions" }
"password-length" = { description = "Length of the password to be generated" }
"rotate-after-disconnect" = { description = "Rotate after SRA session ends [true/false]" }
"rotated-password" = { sensitive = true, description = "Rotated-username password (relevant only for rotator-type=password)" }
"rotated-username" = { description = "Username to be rotated" }
"rotation-hour" = { description = "The hour of the rotation in UTC" }
"rotation-interval" = { description = "Days between every automatic key rotation (1-365)" }
"rotator-type" = { description = "The rotator type: target or password" }
tags = { description = "Tags for the rotated secret" }
"target-name" = { description = "Target name to associate" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_metadata" = "description"
"item_tags" = "tags"
"delete_protection" = "delete_protection"
"rotation_interval" = "rotation_interval"
