[resource]
name = "akeyless_auth_method_oidc"
description = "Manages an OIDC authentication method"
category = "auth_method"

[crud]
create_endpoint = "/auth-method-create-oidc"
create_schema = "authMethodCreateOIDC"
update_endpoint = "/auth-method-update-oidc"
update_schema = "authMethodUpdateOIDC"
read_endpoint = "/get-auth-method"
read_schema = "getAuthMethod"
read_response_schema = "AuthMethod"
delete_endpoint = "/delete-auth-method"
delete_schema = "deleteAuthMethod"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-id" = { computed = true, description = "The auth method access ID" }
"access-expires" = { description = "Access expiration in Unix time (0 = no expiry)" }
"bound-ips" = { description = "CIDR whitelist for access" }
"gw-bound-ips" = { description = "Gateway CIDR whitelist" }
"force-sub-claims" = { type_override = "bool", description = "Force sub-claims enforcement" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
"unique-identifier" = { description = "Unique identifier claim name in the OIDC token" }
"issuer" = { description = "OIDC issuer URL" }
"client-id" = { description = "OIDC client ID" }
"client-secret" = { sensitive = true, description = "OIDC client secret" }
"audience" = { description = "OIDC audience" }
"allowed-redirect-uri" = { description = "Allowed redirect URIs after OIDC login" }
"required-scopes" = { description = "Required OIDC scopes (comma-separated)" }
"required-scopes-prefix" = { description = "Prefix for required scopes" }
"subclaims-delimiters" = { description = "Delimiters for subclaim splitting" }
"jwt-ttl" = { description = "JWT TTL in seconds" }

[read_mapping]
"auth_method_access_id" = "access_id"
"access_info.access_expires" = "access_expires"
"access_info.force_sub_claims" = "force_sub_claims"
"access_info.oidc_access_rules.unique_identifier" = "unique_identifier"
"access_info.oidc_access_rules.issuer" = "issuer"
"access_info.oidc_access_rules.client_id" = "client_id"
"access_info.oidc_access_rules.audience" = "audience"
"access_info.oidc_access_rules.allowed_redirect_uri" = "allowed_redirect_uri"
"access_info.oidc_access_rules.required_scopes" = "required_scopes"
