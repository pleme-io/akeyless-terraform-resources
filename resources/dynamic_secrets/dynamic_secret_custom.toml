[resource]
name = "akeyless_dynamic_secret_custom"
description = "Manages a custom dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-custom"
create_schema = "dynamicSecretCreateCustom"
update_endpoint = "/dynamic-secret-update-custom"
update_schema = "dynamicSecretUpdateCustom"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"create-sync-url" = { description = "URL to call on create/sync" }
"revoke-sync-url" = { description = "URL to call on revoke" }
"rotate-sync-url" = { description = "URL to call on rotate" }
"payload" = { description = "Custom payload to send to the URL" }
"timeout-sec" = { description = "Timeout in seconds for custom calls" }
"admin-rotation-interval-days" = { description = "Admin credentials rotation interval in days" }
"enable-admin-rotation" = { type_override = "bool", description = "Enable admin credentials rotation" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
