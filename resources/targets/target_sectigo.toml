[resource]
name = "akeyless_target_sectigo"
description = "Manages a Sectigo target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-sectigo"
create_schema = "targetCreateSectigo"
update_endpoint = "/target-update-sectigo"
update_schema = "targetUpdateSectigo"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"sectigo-user" = { description = "Sectigo username" }
"sectigo-password" = { sensitive = true, description = "Sectigo password" }
"sectigo-customer-uri" = { description = "Sectigo customer URI" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
