[resource]
name = "akeyless_role_auth_method_assoc"
description = "Manages a role-to-auth-method association in Akeyless Vault"
category = "role"

[crud]
create_endpoint = "/assoc-role-am"
create_schema = "assocRoleAuthMethod"
# No update endpoint — delete and recreate
read_endpoint = "/get-role"
read_schema = "getRole"
read_response_schema = "Role"
delete_endpoint = "/delete-role-association"
delete_schema = "deleteRoleAssociation"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name", "am-name"]

[fields]
"role-name" = { description = "Role name to associate" }
"am-name" = { description = "Auth method name to associate with the role" }
"sub-claims" = { description = "Sub-claims for the association (key=value pairs)" }
"case-sensitive" = { description = "Case-sensitive sub-claims matching" }

[read_mapping]
"role_name" = "role_name"
