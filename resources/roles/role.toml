[resource]
name = "akeyless_role"
description = "Manages a role in Akeyless Vault"
category = "role"

[crud]
create_endpoint = "/create-role"
create_schema = "createRole"
update_endpoint = "/update-role"
update_schema = "updateRole"
read_endpoint = "/get-role"
read_schema = "getRole"
read_response_schema = "Role"
delete_endpoint = "/delete-role"
delete_schema = "deleteRole"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Role description" }
"audit-access" = { description = "Allow this role to view audit logs" }
"analytics-access" = { description = "Allow this role to view analytics" }
"gw-analytics-access" = { description = "Allow this role to view gateway analytics" }
"sra-reports-access" = { description = "Allow this role to view SRA reports" }

[read_mapping]
"role_name" = "name"
"comment" = "description"
"role_auth_methods_assoc" = "auth_method_associations"
