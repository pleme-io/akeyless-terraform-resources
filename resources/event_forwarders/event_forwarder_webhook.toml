category = "event_forwarder"

[crud]
create_endpoint = "/event-forwarder-create-webhook"
create_schema = "eventForwarderCreateWebhook"
update_endpoint = "/event-forwarder-update-webhook"
update_schema = "eventForwarderUpdateWebhook"
read_endpoint = "/get-event-forwarder"
read_schema = "getEventForwarder"
read_response_schema = "getEventForwarderOutput"
delete_endpoint = "/event-forwarder-delete"
delete_schema = "eventForwarderDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

