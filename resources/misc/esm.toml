[resource]
name = "akeyless_esm"
description = "Manages an external secrets manager (ESM) in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/esm-create"
create_schema = "esmCreate"
update_endpoint = "/esm-update"
update_schema = "esmUpdate"
read_endpoint = "/esm-get"
read_schema = "esmGet"
read_response_schema = "EsmGetSecretOutput"
delete_endpoint = "/esm-delete"
delete_schema = "esmDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

