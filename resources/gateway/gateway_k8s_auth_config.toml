[resource]
name = "akeyless_gateway_k8s_auth_config"
description = "Manages a gateway Kubernetes auth config in Akeyless"
category = "gateway"

[crud]
create_endpoint = "/gateway-create-k8s-auth-config"
create_schema = "gatewayCreateK8SAuthConfig"
update_endpoint = "/gateway-update-k8s-auth-config"
update_schema = "gatewayUpdateK8SAuthConfig"
read_endpoint = "/gateway-get-k8s-auth-config"
read_schema = "gatewayGetK8SAuthConfig"
read_response_schema = "GatewayGetK8SAuthConfigOutput"
delete_endpoint = "/gateway-delete-k8s-auth-config"
delete_schema = "gatewayDeleteK8SAuthConfig"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

