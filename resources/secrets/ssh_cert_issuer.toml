[resource]
name = "akeyless_ssh_cert_issuer"
description = "Manages an SSH certificate issuer"
category = "secret"

[crud]
create_endpoint = "/create-ssh-cert-issuer"
create_schema = "createSSHCertIssuer"
update_endpoint = "/update-ssh-cert-issuer"
update_schema = "updateSSHCertIssuer"
read_endpoint = "/describe-item"
read_schema = "describeItem"
read_response_schema = "Item"
delete_endpoint = "/delete-item"
delete_schema = "deleteItem"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"signer-key-name" = { description = "Signing key name for the SSH issuer" }
"ttl" = { description = "Certificate TTL in seconds" }
"allowed-users" = { description = "Allowed users for issued certificates (comma-separated)" }
"principals" = { description = "Default principals (comma-separated)" }
"extensions" = { description = "Certificate extensions (key=value pairs)" }
"host-provider" = { type_override = "bool", description = "Issue host certificates instead of user certificates" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
description = { description = "SSH issuer description" }
tags = { description = "Tags for the SSH issuer" }

[read_mapping]
"item_name" = "name"
"item_type" = "type"
"item_metadata" = "description"
"item_tags" = "tags"
"certificate_issue_details.signer_key_name" = "signer_key_name"
"certificate_issue_details.ttl" = "ttl"
"certificate_issue_details.allowed_users" = "allowed_users"
