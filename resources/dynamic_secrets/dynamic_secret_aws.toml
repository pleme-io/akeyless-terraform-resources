[resource]
name = "akeyless_dynamic_secret_aws"
description = "Manages an AWS dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-aws"
create_schema = "dynamicSecretCreateAws"
update_endpoint = "/dynamic-secret-update-aws"
update_schema = "dynamicSecretUpdateAws"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"access-mode" = { description = "AWS access mode: iam_user or assume_role" }
"admin-rotation-interval-days" = { description = "Admin credentials rotation interval in days" }
"aws-access-key-id" = { sensitive = true, description = "AWS access key ID for the producer" }
"aws-access-secret-key" = { sensitive = true, description = "AWS secret access key for the producer" }
"aws-role-arns" = { description = "AWS role ARNs to assume (comma-separated)" }
"aws-user-console-access" = { type_override = "bool", description = "Enable AWS console access for dynamic users" }
"aws-user-groups" = { description = "AWS IAM groups for dynamic users" }
"aws-user-policies" = { description = "AWS IAM policies for dynamic users" }
"aws-user-programmatic-access" = { type_override = "bool", description = "Enable programmatic access for dynamic users" }
"region" = { description = "AWS region" }
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
"delete_protection" = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }

[read_mapping]
"item_name" = "name"
"dynamic_secret_type" = "access_mode"
"aws_access_key_id" = "aws_access_key_id"
"aws_region" = "region"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
