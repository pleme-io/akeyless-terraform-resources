[resource]
name = "akeyless_dynamic_secret_eks"
description = "Manages an Amazon EKS dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-eks"
create_schema = "dynamicSecretCreateEks"
update_endpoint = "/dynamic-secret-update-eks"
update_schema = "dynamicSecretUpdateEks"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"eks-cluster-name" = { description = "EKS cluster name" }
"eks-cluster-endpoint" = { description = "EKS cluster API server URL" }
"eks-cluster-ca-cert" = { sensitive = true, description = "EKS cluster CA certificate (PEM)" }
"eks-access-key-id" = { sensitive = true, description = "AWS access key ID for EKS" }
"eks-secret-access-key" = { sensitive = true, description = "AWS secret access key for EKS" }
"eks-region" = { description = "AWS region for EKS cluster" }
"eks-assume-role" = { description = "AWS role ARN to assume for EKS" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
