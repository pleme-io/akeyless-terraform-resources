[resource]
name = "akeyless_policy"
description = "Manages a policy in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/policy-create-keys"
create_schema = "policyCreateKeys"
update_endpoint = "/policy-update-keys"
update_schema = "policyUpdateKeys"
read_endpoint = "/policy-get"
read_schema = "policiesGet"
read_response_schema = "policiesGetOutput"
delete_endpoint = "/policy-delete"
delete_schema = "policiesDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

