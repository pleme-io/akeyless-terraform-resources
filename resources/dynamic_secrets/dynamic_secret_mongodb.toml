[resource]
name = "akeyless_dynamic_secret_mongodb"
description = "Manages a MongoDB dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-mongodb"
create_schema = "dynamicSecretCreateMongoDb"
update_endpoint = "/dynamic-secret-update-mongodb"
update_schema = "dynamicSecretUpdateMongoDb"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"mongodb-name" = { description = "MongoDB database name" }
"mongodb-roles" = { description = "MongoDB roles (e.g., readWrite@db)" }
"mongodb-server-uri" = { description = "MongoDB server URI" }
"mongodb-username" = { description = "MongoDB admin username" }
"mongodb-password" = { sensitive = true, description = "MongoDB admin password" }
"mongodb-host-port" = { description = "MongoDB host:port" }
"mongodb-default-auth-db" = { description = "MongoDB default authentication database" }
"mongodb-uri-options" = { description = "MongoDB URI options" }
"mongodb-atlas" = { type_override = "bool", description = "Use MongoDB Atlas" }
"mongodb-atlas-project-id" = { description = "MongoDB Atlas project ID" }
"mongodb-atlas-api-public-key" = { description = "MongoDB Atlas API public key" }
"mongodb-atlas-api-private-key" = { sensitive = true, description = "MongoDB Atlas API private key" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
