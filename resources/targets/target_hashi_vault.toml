[resource]
name = "akeyless_target_hashi_vault"
description = "Manages a HashiCorp Vault target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-hashi-vault"
create_schema = "targetCreateHashiVault"
update_endpoint = "/target-update-hashi-vault"
update_schema = "targetUpdateHashiVault"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"vault-url" = { description = "HashiCorp Vault URL" }
"vault-token" = { sensitive = true, description = "HashiCorp Vault token" }
"vault-namespace" = { description = "HashiCorp Vault namespace" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
