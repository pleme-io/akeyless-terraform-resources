[resource]
name = "akeyless_target_lets_encrypt"
description = "Manages a Let's Encrypt target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-lets-encrypt"
create_schema = "targetCreateLetsEncrypt"
update_endpoint = "/target-update-lets-encrypt"
update_schema = "targetUpdateLetsEncrypt"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
