[resource]
name = "akeyless_dynamic_secret_gcp"
description = "Manages a GCP dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-gcp"
create_schema = "dynamicSecretCreateGcp"
update_endpoint = "/dynamic-secret-update-gcp"
update_schema = "dynamicSecretUpdateGcp"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"gcp-sa-email" = { description = "GCP service account email" }
"gcp-key-algo" = { description = "GCP service account key algorithm" }
"gcp-cred-type" = { description = "GCP credential type: token or key" }
"role-binding" = { description = "Role binding in the format Role,Resource" }
"service-account-type" = { description = "Service account type: fixed or dynamic" }
"gcp-token-scopes" = { description = "GCP access token scopes (comma-separated)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
