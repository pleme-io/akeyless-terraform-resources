[resource]
name = "akeyless_dynamic_secret_artifactory"
description = "Manages an Artifactory dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-artifactory"
create_schema = "dynamicSecretCreateArtifactory"
update_endpoint = "/dynamic-secret-update-artifactory"
update_schema = "dynamicSecretUpdateArtifactory"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"artifactory-admin-name" = { description = "Artifactory admin username" }
"artifactory-admin-pwd" = { sensitive = true, description = "Artifactory admin password" }
"artifactory-token-audience" = { description = "Artifactory token audience" }
"artifactory-token-scope" = { description = "Artifactory token scope" }
"base-url" = { description = "Artifactory base URL" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
