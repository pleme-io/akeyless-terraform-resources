[resource]
name = "akeyless_target_gcp"
description = "Manages a GCP target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-gcp"
create_schema = "targetCreateGcp"
update_endpoint = "/target-update-gcp"
update_schema = "targetUpdateGcp"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"gcp-sa-email" = { description = "GCP service account email" }
"gcp-key" = { sensitive = true, description = "GCP service account key JSON (base64)" }
"use-gw-cloud-identity" = { type_override = "bool", description = "Use gateway cloud identity for authentication" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
