[resource]
name = "akeyless_dynamic_secret_mssql"
description = "Manages an MSSQL dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-mssql"
create_schema = "dynamicSecretCreateMsSql"
update_endpoint = "/dynamic-secret-update-mssql"
update_schema = "dynamicSecretUpdateMsSql"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"mssql-dbname" = { description = "MSSQL database name" }
"mssql-username" = { description = "MSSQL admin username" }
"mssql-password" = { sensitive = true, description = "MSSQL admin password" }
"mssql-host" = { description = "MSSQL host" }
"mssql-port" = { description = "MSSQL port (default: 1433)" }
"mssql-creation-statements" = { description = "MSSQL creation statements" }
"mssql-revocation-statements" = { description = "MSSQL revocation statements" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
