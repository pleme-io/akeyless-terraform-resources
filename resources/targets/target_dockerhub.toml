[resource]
name = "akeyless_target_dockerhub"
description = "Manages a Docker Hub target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-dockerhub"
create_schema = "targetCreateDockerhub"
update_endpoint = "/target-update-dockerhub"
update_schema = "targetUpdateDockerhub"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"dockerhub-username" = { description = "Docker Hub username" }
"dockerhub-password" = { sensitive = true, description = "Docker Hub password or access token" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
