[resource]
name = "akeyless_dynamic_secret_gke"
description = "Manages a Google GKE dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-gke"
create_schema = "dynamicSecretCreateGke"
update_endpoint = "/dynamic-secret-update-gke"
update_schema = "dynamicSecretUpdateGke"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"gke-cluster-endpoint" = { description = "GKE cluster API server URL" }
"gke-cluster-cert" = { sensitive = true, description = "GKE cluster CA certificate (PEM)" }
"gke-account-key" = { sensitive = true, description = "GCP service account key JSON (base64)" }
"gke-cluster-name" = { description = "GKE cluster name" }
"gke-service-account-email" = { description = "GCP service account email" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
