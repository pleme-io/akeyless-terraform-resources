[resource]
name = "akeyless_dynamic_secret_ldap"
description = "Manages an LDAP dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-ldap"
create_schema = "dynamicSecretCreateLdap"
update_endpoint = "/dynamic-secret-update-ldap"
update_schema = "dynamicSecretUpdateLdap"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"ldap-url" = { description = "LDAP server URL" }
"bind-dn" = { description = "LDAP bind DN" }
"bind-dn-password" = { sensitive = true, description = "LDAP bind DN password" }
"ldap-certificate" = { sensitive = true, description = "LDAP server TLS certificate (PEM)" }
"user-dn" = { description = "Base DN for user creation" }
"user-attribute" = { description = "LDAP user attribute" }
"group-dn" = { description = "Group DN for dynamic users" }
"token-expiration" = { description = "LDAP token expiration in seconds" }
"external-username" = { description = "External username for fixed mode" }
"ldap-token-type" = { description = "LDAP token type: token or password" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
