[resource]
name = "akeyless_target_ldap"
description = "Manages an LDAP target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-ldap"
create_schema = "targetCreateLdap"
update_endpoint = "/target-update-ldap"
update_schema = "targetUpdateLdap"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"ldap-url" = { description = "LDAP server URL (e.g., ldap://host:389)" }
"bind-dn" = { description = "LDAP bind DN" }
"bind-dn-password" = { sensitive = true, description = "LDAP bind DN password" }
"ldap-certificate" = { sensitive = true, description = "LDAP server TLS certificate (PEM)" }
"token-expiration" = { description = "LDAP token expiration in seconds" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
