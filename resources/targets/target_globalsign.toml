[resource]
name = "akeyless_target_globalsign"
description = "Manages a GlobalSign target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-globalsign"
create_schema = "targetCreateGlobalSign"
update_endpoint = "/target-update-globalsign"
update_schema = "targetUpdateGlobalSign"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"username" = { description = "GlobalSign username" }
"password" = { sensitive = true, description = "GlobalSign password" }
"profile-id" = { description = "GlobalSign profile ID" }
"contact-first-name" = { description = "Contact first name" }
"contact-last-name" = { description = "Contact last name" }
"contact-phone" = { description = "Contact phone number" }
"contact-email" = { description = "Contact email" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
