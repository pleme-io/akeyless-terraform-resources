[resource]
name = "akeyless_dynamic_secret_postgresql"
description = "Manages a PostgreSQL dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-postgresql"
create_schema = "dynamicSecretCreatePostgreSql"
update_endpoint = "/dynamic-secret-update-postgresql"
update_schema = "dynamicSecretUpdatePostgreSql"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"postgresql-dbname" = { description = "PostgreSQL database name" }
"postgresql-username" = { description = "PostgreSQL admin username" }
"postgresql-password" = { sensitive = true, description = "PostgreSQL admin password" }
"postgresql-host" = { description = "PostgreSQL host" }
"postgresql-port" = { description = "PostgreSQL port (default: 5432)" }
"creation-statements" = { description = "PostgreSQL creation statements" }
"revocation-statements" = { description = "PostgreSQL revocation statements" }
"ssl" = { type_override = "bool", description = "Enable SSL connection" }
"ssl-certificate" = { sensitive = true, description = "SSL certificate (PEM)" }
"db-server-certificates" = { sensitive = true, description = "Database server certificates (PEM)" }
"db-server-name" = { description = "Database server name for TLS verification" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
