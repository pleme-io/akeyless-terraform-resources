[resource]
name = "akeyless_dynamic_secret_cassandra"
description = "Manages a Cassandra dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-cassandra"
create_schema = "dynamicSecretCreateCassandra"
update_endpoint = "/dynamic-secret-update-cassandra"
update_schema = "dynamicSecretUpdateCassandra"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"cassandra-hosts" = { description = "Cassandra hosts (comma-separated)" }
"cassandra-port" = { description = "Cassandra port (default: 9042)" }
"cassandra-username" = { description = "Cassandra admin username" }
"cassandra-password" = { sensitive = true, description = "Cassandra admin password" }
"cassandra-creation-statements" = { description = "Cassandra creation statements (CQL)" }
"ssl" = { type_override = "bool", description = "Enable SSL connection" }
"ssl-certificate" = { sensitive = true, description = "SSL certificate (PEM)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
