[resource]
name = "akeyless_kmip_environment"
description = "Manages a KMIP environment in Akeyless Vault"
category = "misc"

[crud]
create_endpoint = "/kmip-create-environment"
create_schema = "kmipServerSetup"
read_endpoint = "/kmip-get-environment"
read_schema = "kmipDescribeServer"
read_response_schema = "kmipDescribeServerOutput"
delete_endpoint = "/kmip-delete-environment"
delete_schema = "kmipDeleteServer"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

