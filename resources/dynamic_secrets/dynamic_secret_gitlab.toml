[resource]
name = "akeyless_dynamic_secret_gitlab"
description = "Manages a GitLab dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-gitlab"
create_schema = "dynamicSecretCreateGitlab"
update_endpoint = "/dynamic-secret-update-gitlab"
update_schema = "dynamicSecretUpdateGitlab"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"gitlab-access-token" = { sensitive = true, description = "GitLab personal access token" }
"gitlab-certificate" = { sensitive = true, description = "GitLab TLS certificate (PEM)" }
"gitlab-url" = { description = "GitLab URL (for self-hosted)" }
"gitlab-access-type" = { description = "GitLab access type: personal or project" }
"gitlab-role" = { description = "GitLab role for dynamic tokens" }
"gitlab-token-scopes" = { description = "GitLab token scopes (comma-separated)" }
"group-name" = { description = "GitLab group name" }
"installation-organization" = { description = "GitLab organization" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
