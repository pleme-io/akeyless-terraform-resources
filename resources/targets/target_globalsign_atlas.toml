[resource]
name = "akeyless_target_globalsign_atlas"
description = "Manages a GlobalSign Atlas target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-globalsign-atlas"
create_schema = "targetCreateGlobalSignAtlas"
update_endpoint = "/target-update-globalsign-atlas"
update_schema = "targetUpdateGlobalSignAtlas"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"api-key" = { sensitive = true, description = "GlobalSign Atlas API key" }
"api-secret" = { sensitive = true, description = "GlobalSign Atlas API secret" }
"mutual-tls-cert" = { sensitive = true, description = "Mutual TLS client certificate (PEM)" }
"mutual-tls-key" = { sensitive = true, description = "Mutual TLS client key (PEM)" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
