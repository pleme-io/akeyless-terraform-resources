[resource]
name = "akeyless_target_rabbitmq"
description = "Manages a RabbitMQ target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-rabbitmq"
create_schema = "targetCreateRabbitMq"
update_endpoint = "/target-update-rabbitmq"
update_schema = "targetUpdateRabbitMq"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"rabbitmq-server-uri" = { description = "RabbitMQ management API URI" }
"rabbitmq-server-user" = { description = "RabbitMQ admin username" }
"rabbitmq-server-password" = { sensitive = true, description = "RabbitMQ admin password" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
