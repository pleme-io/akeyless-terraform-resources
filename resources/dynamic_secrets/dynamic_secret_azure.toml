[resource]
name = "akeyless_dynamic_secret_azure"
description = "Manages an Azure dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-azure"
create_schema = "dynamicSecretCreateAzure"
update_endpoint = "/dynamic-secret-update-azure"
update_schema = "dynamicSecretUpdateAzure"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"azure-client-id" = { description = "Azure client/application ID" }
"azure-client-secret" = { sensitive = true, description = "Azure client secret" }
"azure-tenant-id" = { description = "Azure tenant ID" }
"azure-subscription-id" = { description = "Azure subscription ID" }
"app-obj-id" = { description = "Azure application object ID" }
"user-group-obj-id" = { description = "Azure user group object ID" }
"user-role-template-id" = { description = "Azure role template ID" }
"user-portal-access" = { type_override = "bool", description = "Enable Azure portal access" }
"user-programmatic-access" = { type_override = "bool", description = "Enable Azure programmatic access" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
