[resource]
name = "akeyless_target_k8s"
description = "Manages a Kubernetes target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-k8s"
create_schema = "targetCreateK8s"
update_endpoint = "/target-update-k8s"
update_schema = "targetUpdateK8s"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"k8s-cluster-endpoint" = { description = "Kubernetes API server URL" }
"k8s-cluster-ca-cert" = { sensitive = true, description = "Kubernetes cluster CA certificate (PEM)" }
"k8s-cluster-token" = { sensitive = true, description = "Kubernetes bearer token" }
"k8s-auth-type" = { description = "Kubernetes auth type: token, certificate, or password" }
"k8s-client-certificate" = { sensitive = true, description = "Kubernetes client certificate (PEM)" }
"k8s-client-key" = { sensitive = true, description = "Kubernetes client key (PEM)" }
"use-gw-service-account" = { type_override = "bool", description = "Use gateway service account for authentication" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
