[resource]
name = "akeyless_dynamic_secret_hanadb"
description = "Manages a SAP HANA dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-hanadb"
create_schema = "dynamicSecretCreateHanaDb"
update_endpoint = "/dynamic-secret-update-hanadb"
update_schema = "dynamicSecretUpdateHanaDb"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"hanadb-dbname" = { description = "HANA database name" }
"hanadb-username" = { description = "HANA admin username" }
"hanadb-password" = { sensitive = true, description = "HANA admin password" }
"hanadb-host" = { description = "HANA host" }
"hanadb-port" = { description = "HANA port (default: 443)" }
"hanadb-creation-statements" = { description = "HANA SQL creation statements" }
"hanadb-revocation-statements" = { description = "HANA SQL revocation statements" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
