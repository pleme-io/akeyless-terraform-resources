[resource]
name = "akeyless_target_salesforce"
description = "Manages a Salesforce target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-salesforce"
create_schema = "targetCreateSalesforce"
update_endpoint = "/target-update-salesforce"
update_schema = "targetUpdateSalesforce"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"client-id" = { description = "Salesforce connected app client ID" }
"client-secret" = { sensitive = true, description = "Salesforce connected app client secret" }
"security-token" = { sensitive = true, description = "Salesforce security token" }
"tenant-url" = { description = "Salesforce tenant URL" }
"app-private-key" = { sensitive = true, description = "Salesforce app private key (PEM)" }
"auth-flow" = { description = "Salesforce auth flow: user-password or jwt-bearer" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
