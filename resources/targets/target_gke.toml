[resource]
name = "akeyless_target_gke"
description = "Manages a Google GKE target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-gke"
create_schema = "targetCreateGke"
update_endpoint = "/target-update-gke"
update_schema = "targetUpdateGke"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"gke-cluster-endpoint" = { description = "GKE cluster API server URL" }
"gke-cluster-cert" = { sensitive = true, description = "GKE cluster CA certificate (PEM)" }
"gke-account-key" = { sensitive = true, description = "GCP service account key JSON (base64)" }
"gke-cluster-name" = { description = "GKE cluster name" }
"gke-service-account-email" = { description = "GCP service account email" }
"use-gw-cloud-identity" = { type_override = "bool", description = "Use gateway cloud identity for authentication" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
