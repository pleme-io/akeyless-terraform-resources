[resource]
name = "akeyless_target_github"
description = "Manages a GitHub target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-github"
create_schema = "targetCreateGithub"
update_endpoint = "/target-update-github"
update_schema = "targetUpdateGithub"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"github-app-id" = { description = "GitHub App ID" }
"github-app-private-key" = { sensitive = true, description = "GitHub App private key (PEM)" }
"github-base-url" = { description = "GitHub base URL (for GitHub Enterprise)" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
