[resource]
name = "akeyless_target_windows"
description = "Manages a Windows target in Akeyless Vault"
category = "target"

[crud]
create_endpoint = "/target-create-windows"
create_schema = "targetCreateWindows"
update_endpoint = "/target-update-windows"
update_schema = "targetUpdateWindows"
read_endpoint = "/target-get"
read_schema = "targetGet"
read_response_schema = "Target"
delete_endpoint = "/target-delete"
delete_schema = "targetDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
description = { description = "Target description" }
"hostname" = { description = "Windows host address" }
"username" = { description = "Windows username" }
"password" = { sensitive = true, description = "Windows password" }
"domain" = { description = "Windows domain" }
"port" = { description = "WinRM port (default: 5986)" }
"use-tls" = { type_override = "bool", description = "Use TLS for WinRM connection" }
"certificate" = { sensitive = true, description = "Client certificate (PEM)" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }

[read_mapping]
"target_name" = "name"
"comment" = "description"
"target_type" = "type"
