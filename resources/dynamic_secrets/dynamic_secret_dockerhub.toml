[resource]
name = "akeyless_dynamic_secret_dockerhub"
description = "Manages a Docker Hub dynamic secret producer"
category = "dynamic_secret"

[crud]
create_endpoint = "/dynamic-secret-create-dockerhub"
create_schema = "dynamicSecretCreateDockerhub"
update_endpoint = "/dynamic-secret-update-dockerhub"
update_schema = "dynamicSecretUpdateDockerhub"
read_endpoint = "/dynamic-secret-get"
read_schema = "dynamicSecretGet"
read_response_schema = "DSProducerDetails"
delete_endpoint = "/dynamic-secret-delete"
delete_schema = "dynamicSecretDelete"

[identity]
id_field = "name"
import_field = "name"
force_new_fields = ["name"]

[fields]
"target-name" = { description = "Target name associated with this producer" }
"user-ttl" = { description = "User TTL (e.g., 60m, 12h)" }
"producer-encryption-key-name" = { description = "Dynamic producer encryption key" }
delete_protection = { type_override = "bool", description = "Enable delete protection" }
tags = { description = "Tags for the producer" }
"dockerhub-username" = { description = "Docker Hub username" }
"dockerhub-password" = { sensitive = true, description = "Docker Hub password or access token" }
"dockerhub-token-scopes" = { description = "Docker Hub token scopes (comma-separated)" }

[read_mapping]
"item_name" = "name"
"item_targets_assoc.0.target_name" = "target_name"
"user_ttl" = "user_ttl"
